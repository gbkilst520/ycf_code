services:
  http-service:
    build:
      context: .
      dockerfile: docker/http-service.Dockerfile
    image: ycf/http-service:local
    container_name: ycf-http-service
    ports:
      - "8081:8081"
    networks:
      - ycf-net

  gateway-service:
    build:
      context: .
      dockerfile: docker/gateway-service.Dockerfile
    image: ycf/gateway-service:local
    container_name: ycf-gateway-service
    depends_on:
      - http-service
    ports:
      - "8080:8080"
    networks:
      - ycf-net

  rpc-service:
    build:
      context: .
      dockerfile: docker/rpc-service.Dockerfile
    image: ycf/rpc-service:local
    container_name: ycf-rpc-service
    ports:
      - "8082:8082"
    networks:
      - ycf-net
    profiles:
      - rpc

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: ycf-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
    networks:
      - ycf-net
    profiles:
      - nacos

  mysql:
    image: mysql:8.4
    container_name: ycf-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ycf_demo
      MYSQL_USER: ycf
      MYSQL_PASSWORD: ycf123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ycf-net
    profiles:
      - db

networks:
  ycf-net:
    driver: bridge

volumes:
  mysql-data:
